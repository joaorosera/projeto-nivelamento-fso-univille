<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denúncia - Descarte Consciente</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="fundo-imagem">

    <div class="cabecalho">
        <a href="index.html" class="logo">Descarte Consciente de Pilhas</a>
        <div class="menu">
            <a href="index.html">Início</a>
            <a href="pontos.html">Pontos de Coleta</a>
            <a href="solicitacao.html">Solicitação de Coleta</a>
            <a href="denuncia.html">Denúncia</a>
        </div>
    </div>

    <div class="banner-denuncia">
        <div class="conteudo-denuncia">
            <h1>Denunciar Descarte Irregular</h1>
            <p>Ajude a manter a cidade limpa denunciando<br>locais com descarte incorreto de pilhas</p>
        </div>
    </div>

    <div class="container-form-denuncia">
        
        <div class="caixa-denuncia">
            <h2 class="titulo-denuncia">Realizar Denúncia</h2>

            <form action="sucesso.html" method="POST" enctype="multipart/form-data">
                
                <label class="label-denuncia">Nome (Opcional)</label>
                <input type="text" name="nome" class="input-denuncia" autocomplete="off" placeholder="Deixe em branco para denúncia anônima">
                
                <label class="label-denuncia">Local do ocorrido</label>
                <input type="text" name="local" class="input-denuncia" required autocomplete="off">
                
                <label class="label-denuncia">Descrição</label>
                <textarea name="descricao" rows="5" maxlength="500" class="textarea-form" required></textarea>
                
                <label class="label-denuncia">Anexar evidência (Fotos ou PDF)</label>
                <input type="file" name="arquivo" class="input-arquivo" accept="image/*, .pdf">
                
                <button type="submit" class="botao-denuncia">Enviar denúncia</button>
                
            </form>
        </div>

    </div>

    <div class="rodape">
        <p>(©) Projeto Acadêmico - João Vitor Rosera</p>
        <p>Contribua para um futuro sustentável!</p>
    </div>

</body>
</html>
